# ==========================================
# BASE DE DATOS H2 EN MEMORIA
# ==========================================
spring.datasource.url=jdbc:h2:mem:schedulerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONSOLA H2 (visible en /h2-console)
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# EXPRESIONES CRON EXTERNALIZADAS
# ==========================================
scheduler.sesiones.cron=0 */2 * * * *
scheduler.ordenes.cron=0 */1 * * * *

# ==========================================
# LOGS
# ==========================================
logging.level.com.example.scheduler=DEBUG
